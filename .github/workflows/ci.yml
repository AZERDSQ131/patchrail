name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - uses: astral-sh/setup-uv@v5
      - name: Install
        run: uv sync --extra dev
      - name: Lint
        run: uv run ruff check .
      - name: Test
        run: uv run pytest -q
      - name: Benchmark fixtures
        run: uv run patchrail ci benchmark examples/ci-triage --format json
      - name: CLI smoke
        run: |
          uv run patchrail doctor
          uv run patchrail ci explain --log examples/ci-triage/dependency-failure.log --format text

  package-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: astral-sh/setup-uv@v5
      - name: Build distribution artifacts
        run: uv run --extra dev python -m build
      - name: Check distribution metadata
        run: uv run --extra dev twine check dist/*
      - name: Install wheel in a fresh virtual environment
        shell: bash
        run: |
          set -euo pipefail
          python -m venv .pkg-smoke
          . .pkg-smoke/bin/activate
          python -m pip install --upgrade pip
          python -m pip install dist/*.whl
          patchrail doctor --format json
          patchrail ci explain --log examples/ci-triage/dependency-failure.log --format text

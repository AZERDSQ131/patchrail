name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - uses: astral-sh/setup-uv@v8.1.0
      - name: Install
        run: uv sync --extra dev
      - name: Lint
        run: uv run ruff check .
      - name: Format check
        run: uv run ruff format --check .
      - name: Test
        run: uv run pytest -q
      - name: Benchmark fixtures
        run: uv run patchrail ci benchmark examples/ci-triage --format json
      - name: CLI smoke
        run: |
          uv run patchrail doctor
          uv run patchrail ci explain --log examples/ci-triage/dependency-failure.log --format text

  package-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - uses: astral-sh/setup-uv@v8.1.0
      - name: Build distribution artifacts
        run: uv run --extra dev python -m build
      - name: Check distribution metadata
        run: uv run --extra dev twine check dist/*
      - name: Install wheel in a fresh virtual environment
        shell: bash
        run: |
          set -euo pipefail
          python -m venv .pkg-smoke
          . .pkg-smoke/bin/activate
          python -m pip install --upgrade pip
          python -m pip install dist/*.whl
          patchrail doctor --format json
          patchrail ci explain --log examples/ci-triage/dependency-failure.log --format text

  oss-evidence-snapshot:
    runs-on: ubuntu-latest
    needs: [test, package-smoke]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - uses: astral-sh/setup-uv@v8.1.0
      - name: Install
        run: uv sync --extra dev
      - name: Generate OSS evidence snapshot
        run: |
          mkdir -p patchrail-oss-evidence
          uv run patchrail evidence snapshot --format json --out patchrail-oss-evidence/evidence-snapshot.json
          uv run patchrail evidence snapshot --format markdown --out patchrail-oss-evidence/evidence-snapshot.md
          uv run patchrail evidence control-plane --format json --out patchrail-oss-evidence/control-plane-evidence.json
          uv run patchrail evidence control-plane --format markdown --out patchrail-oss-evidence/control-plane-evidence.md
          uv run patchrail evidence application-dossier --format json --out patchrail-oss-evidence/application-dossier.json
          uv run patchrail evidence application-dossier --format markdown --out patchrail-oss-evidence/application-dossier.md
          uv run python examples/local-agent-queue/run_demo.py --output .patchrail-ci-local-agent-queue --force
          mkdir -p patchrail-oss-evidence/local-agent-queue
          cp .patchrail-ci-local-agent-queue/summary.json patchrail-oss-evidence/local-agent-queue/summary.json
          cp .patchrail-ci-local-agent-queue/bundle.json patchrail-oss-evidence/local-agent-queue/bundle.json
          cp .patchrail-ci-local-agent-queue/bundle.md patchrail-oss-evidence/local-agent-queue/bundle.md
      - name: Upload OSS evidence snapshot
        uses: actions/upload-artifact@v7.0.1
        with:
          name: patchrail-oss-evidence
          path: patchrail-oss-evidence/
          if-no-files-found: error
